<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SmartBite</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --input-bg: #e5e5ea;
            --text-main: #000000;
            --text-sec: #8e8e93;
            --accent: #c75933; 
            --accent-muted: rgba(199, 89, 51, 0.15);
            --btn-text: #ffffff;
            --border: rgba(60, 60, 67, 0.15);
            --glass-bg: rgba(242, 242, 247, 0.8);
            --modal-overlay: rgba(0, 0, 0, 0.4);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --card-bg: #1c1c1e;
                --input-bg: #2c2c2e;
                --text-main: #ffffff;
                --text-sec: #8e8e93;
                --accent: #ebd9cc; 
                --accent-muted: rgba(235, 217, 204, 0.15);
                --btn-text: #000000;
                --border: rgba(84, 84, 88, 0.3);
                --glass-bg: rgba(30, 30, 30, 0.7);
                --modal-overlay: rgba(0, 0, 0, 0.6);
            }
        }
        
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background: var(--bg-color); color: var(--text-main); padding-bottom: 120px; padding-top: env(safe-area-inset-top); }
        
        header { 
            position: sticky; top: 0; background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 12px 20px 16px; display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 0.5px solid var(--border);
        }
        h1 { margin: 0; font-size: 32px; font-weight: 700; letter-spacing: -0.5px; }
        .header-btn { background: none; border: none; color: var(--accent); font-size: 17px; font-weight: 600; cursor: pointer; }

        .tab-content { display: none; padding: 16px 20px; }
        .tab-content.active { display: block; }

        .card-group { background: var(--card-bg); border-radius: 12px; margin-bottom: 24px; overflow: hidden; }
        .card-header { padding: 12px 16px 6px; font-size: 13px; font-weight: 600; color: var(--text-sec); text-transform: uppercase; }
        .card-row { padding: 14px 16px; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .card-row:last-child { border-bottom: none; }
        
        .ios-input { width: 100%; padding: 14px 16px; border-radius: 12px; border: none; background: var(--input-bg); color: var(--text-main); font-size: 17px; outline: none; margin-bottom: 15px; }
        
        .search-bar { display: flex; gap: 10px; margin-bottom: 16px; background: var(--input-bg); padding: 4px 8px 4px 16px; border-radius: 14px; align-items: center; }
        .search-bar input { flex: 1; border: none; background: transparent; font-size: 17px; color: var(--text-main); outline: none; padding: 10px 0; }
        .btn-add { color: var(--accent); background: none; border: none; font-size: 26px; }

        .tag-scroll { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 12px; scrollbar-width: none; }
        .tag { background: var(--card-bg); color: var(--text-main); padding: 8px 16px; border-radius: 20px; font-size: 15px; border: 0.5px solid var(--border); }
        .tag.active { background: var(--accent); color: var(--btn-text); }

        .ios-btn-primary { width: 100%; padding: 16px; background: var(--accent); color: var(--btn-text); border: none; border-radius: 14px; font-weight: 700; font-size: 17px; }

        /* NAV BAR */
        nav { 
            position: fixed; bottom: 0; width: 100%; background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            border-top: 0.5px solid var(--border); display: flex; justify-content: space-around; 
            padding-bottom: env(safe-area-inset-bottom); padding-top: 10px; z-index: 100;
        }
        .nav-item { flex: 1; text-align: center; color: var(--text-sec); font-size: 10px; font-weight: 600; border: none; background: none; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { width: 24px; height: 24px; display: block; margin: 0 auto 4px auto; fill: none; stroke: currentColor; stroke-width: 2.2; }
        
        /* MODAL - KLUCZOWA ZMIANA DLA KLAWIATURY */
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--modal-overlay); z-index: 200; align-items: flex-end; transition: 0.3s;
        }
        .modal-overlay.active { display: flex; }
        /* Klasa dodawana gdy klawiatura jest aktywna */
        .modal-overlay.keyboard-active { align-items: center; } 

        .modal { 
            background: var(--card-bg); width: 100%; max-height: 90vh; border-radius: 24px 24px 0 0; 
            display: flex; flex-direction: column; animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .keyboard-active .modal { border-radius: 24px; width: 92%; margin: 0 auto; max-height: 50vh; }
        
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .modal-drag { width: 40px; height: 5px; background: var(--text-sec); border-radius: 3px; margin: 12px auto 8px; opacity: 0.3;}
        .modal-header { padding: 10px 20px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid var(--border);}
        .modal-body { padding: 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-sec); font-size: 16px; line-height: 1.4; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-database-compat.js"></script>
</head>
<body>

    <header>
        <h1 id="page-title">Planner</h1>
        <button class="header-btn" id="header-action" style="display:none;"></button>
    </header>

    <main id="tab-planner" class="tab-content active"><div id="planner-list"></div></main>
    <main id="tab-shop" class="tab-content"><div id="shop-list"></div></main>
    <main id="tab-pantry" class="tab-content">
        <div class="search-bar">
            <input type="text" id="pantry-input" placeholder="Add item..." onfocus="onInputFocus()" onblur="onInputBlur()" oninput="updatePantrySuggestions()">
            <button class="btn-add" onclick="addPantryItem()">+</button>
        </div>
        <div class="tag-scroll" id="pantry-suggestions"></div>
        <div id="pantry-list"></div>
    </main>
    <main id="tab-recipes" class="tab-content"><div id="recipes-list"></div></main>
    <main id="tab-cook" class="tab-content">
        <div class="search-bar">
            <input type="text" id="cook-input" placeholder="What's inside?" onfocus="onInputFocus()" onblur="onInputBlur()" oninput="updateCookSuggestions()">
            <button class="btn-add" onclick="addCookTag()">+</button>
        </div>
        <div class="tag-scroll" id="cook-tags"></div>
        <div id="cook-results"></div>
    </main>

    <nav>
        <button class="nav-item active" onclick="switchTab('planner', 'Planner')">
            <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            Planner
        </button>
        <button class="nav-item" onclick="switchTab('shop', 'Shop')">
            <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            Shop
        </button>
        <button class="nav-item" onclick="switchTab('pantry', 'Pantry')">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            Pantry
        </button>
        <button class="nav-item" onclick="switchTab('recipes', 'Recipes')">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
            Recipes
        </button>
        <button class="nav-item" onclick="switchTab('cook', 'Cook Now')">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2c0 10 8 10 8 18a8 8 0 0 1-16 0c0-8 8-8 8-18z"></path></svg>
            Cook Now
        </button>
    </nav>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-drag"></div>
            <div class="modal-header">
                <span style="font-weight:800; font-size:20px;" id="modal-title">Edit</span>
                <span style="color:var(--accent); font-weight:600;" onclick="closeModal()">Close</span>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

<script>
// --- FIREBASE CONFIG ---
const firebaseConfig = {
    apiKey: "AIzaSyAiaSwfhzy5PpfC_POwlhgBwpYyiyWA2Ow",
    authDomain: "smartbite-67853.firebaseapp.com",
    projectId: "smartbite-67853",
    storageBucket: "smartbite-67853.firebasestorage.app",
    messagingSenderId: "355276308842",
    appId: "1:355276308842:web:86351c955c63c372986513",
    databaseURL: "https://smartbite-67853-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const dbRef = firebase.database().ref('smartbite_shared_data');
let db = { plan: [], pantry: [], savedIng: [], checked: [], dishes: [] };

dbRef.on('value', (snap) => {
    const data = snap.val();
    if (data) {
        db = data;
        if (!db.plan || db.plan.length === 0) db.plan = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"].map(d => ({day: d, dish: null}));
        renderAll();
    } else { initDB(); }
});

function save() { dbRef.set(db); }
function initDB() {
    db = {
        plan: ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"].map(d => ({day: d, dish: null})),
        pantry: [], savedIng: [], checked: [], dishes: []
    };
    save();
}

// --- UI LOGIC ---
function onInputFocus() { document.getElementById('modal').classList.add('keyboard-active'); }
function onInputBlur() { setTimeout(() => document.getElementById('modal').classList.remove('keyboard-active'), 100); }

function switchTab(id, title) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('tab-'+id).classList.add('active');
    event.currentTarget.classList.add('active');
    document.getElementById('page-title').innerText = title;
    
    const act = document.getElementById('header-action');
    act.style.display = (id === 'shop' || id === 'recipes') ? 'block' : 'none';
    if(id === 'shop') { act.innerText = 'Clear'; act.onclick = () => { db.checked = []; save(); }; }
    if(id === 'recipes') { act.innerText = '+ Add'; act.onclick = () => openRecipeModal(null); }
    renderAll();
}

function openModal(title, html) {
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-body').innerHTML = html;
    document.getElementById('modal').style.display = 'flex';
    setTimeout(() => document.getElementById('modal').classList.add('active'), 10);
}

function closeModal() {
    document.getElementById('modal').classList.remove('active');
    setTimeout(() => document.getElementById('modal').style.display = 'none', 300);
}

// --- RENDERERS ---
function renderAll() { renderPlanner(); renderShop(); renderPantry(); renderRecipes(); renderCookNow(); }

function renderPlanner() {
    let h = '<div class="card-group">';
    db.plan.forEach((p, i) => {
        h += `<div class="card-row" onclick="pickDish(${i})">
            <span style="font-weight:700;">${p.day}</span>
            <span style="color:var(--accent)">${p.dish || 'Plan...'}</span>
        </div>`;
    });
    document.getElementById('planner-list').innerHTML = h + '</div>';
}

function pickDish(idx) {
    let h = '<div class="card-group"><div class="card-row" onclick="setDish('+idx+', null)">Clear</div>';
    db.dishes.forEach(d => { h += `<div class="card-row" onclick="setDish(${idx}, '${d.name}')">${d.name}</div>`; });
    openModal('Select Dish', h + '</div>');
}
function setDish(i, n) { db.plan[i].dish = n; save(); closeModal(); }

function renderRecipes() {
    if(!db.dishes || db.dishes.length === 0) {
        document.getElementById('recipes-list').innerHTML = '<div class="empty-state">No recipes.<br>Click + Add to start.</div>';
        return;
    }
    let h = '<div class="card-group">';
    db.dishes.forEach(d => {
        h += `<div class="card-row" onclick="openRecipeModal(${d.id})">
            <div><div style="font-weight:700;">${d.name}</div><div style="font-size:13px; color:var(--text-sec);">${d.ingredients.join(', ')}</div></div>
        </div>`;
    });
    document.getElementById('recipes-list').innerHTML = h + '</div>';
}

let editId = null; let editIngs = [];
function openRecipeModal(id) {
    editId = id;
    const d = db.dishes.find(x => x.id === id);
    editIngs = d ? [...d.ingredients] : [];
    
    let h = `
        <input type="text" id="r-name" class="ios-input" value="${d?d.name:''}" placeholder="Recipe Name" onfocus="onInputFocus()" onblur="onInputBlur()">
        <div id="r-ings" class="card-group"></div>
        <div class="search-bar">
            <input type="text" id="r-ing-in" placeholder="Add ingredient..." onfocus="onInputFocus()" onblur="onInputBlur()">
            <button class="btn-add" onclick="addRIng()">+</button>
        </div>
        <button class="ios-btn-primary" onclick="saveRecipe()">Save Recipe</button>
        ${id ? '<button style="color:red; width:100%; border:none; background:none; margin-top:15px;" onclick="delRecipe()">Delete Recipe</button>' : ''}
    `;
    openModal(id?'Edit Recipe':'New Recipe', h);
    renderRIngs();
}

function renderRIngs() {
    document.getElementById('r-ings').innerHTML = editIngs.map((ing, i) => `
        <div class="card-row"><span>${ing}</span><span style="color:red;" onclick="editIngs.splice(${i},1);renderRIngs()">Delete</span></div>
    `).join('');
}
function addRIng() {
    const val = document.getElementById('r-ing-in').value.trim();
    if(val) { editIngs.push(val); document.getElementById('r-ing-in').value = ''; renderRIngs(); }
}
function saveRecipe() {
    const n = document.getElementById('r-name').value.trim();
    if(!n) return;
    if(editId) { const d = db.dishes.find(x=>x.id===editId); d.name=n; d.ingredients=editIngs; }
    else db.dishes.push({id: Date.now(), name:n, ingredients:editIngs});
    save(); closeModal();
}
function delRecipe() { db.dishes = db.dishes.filter(x=>x.id!==editId); save(); closeModal(); }

// --- Pozostałe funkcje (Shop, Pantry, Cook) analogicznie jak wcześniej ---
function renderPantry() {
    let h = '<div class="card-group">';
    db.pantry.forEach(i => {
        h += `<div class="card-row"><span>${i.name}</span><span style="color:red;" onclick="db.pantry=db.pantry.filter(x=>x.name!=='${i.name}');save()">Delete</span></div>`;
    });
    document.getElementById('pantry-list').innerHTML = h + '</div>';
}
function addPantryItem() {
    const val = document.getElementById('pantry-input').value.trim();
    if(val) { db.pantry.push({name:val, isAvail:true}); document.getElementById('pantry-input').value=''; save(); }
}
function renderShop() {
    const list = [];
    db.plan.forEach(p => {
        if(p.dish) {
            const d = db.dishes.find(x=>x.name===p.dish);
            if(d) d.ingredients.forEach(ing => { if(!list.includes(ing)) list.push(ing); });
        }
    });
    let h = '<div class="card-group">';
    list.forEach(item => {
        const checked = db.checked.includes(item);
        h += `<div class="card-row" onclick="toggleCheck('${item}')">
            <span style="${checked?'text-decoration:line-through;color:grey':''}">${item}</span>
            <span>${checked?'✅':'⚪️'}</span>
        </div>`;
    });
    document.getElementById('shop-list').innerHTML = h + '</div>';
}
function toggleCheck(it) {
    if(db.checked.includes(it)) db.checked = db.checked.filter(x=>x!==it);
    else db.checked.push(it);
    save();
}
function renderCookNow() {
    document.getElementById('cook-results').innerHTML = '<div class="empty-state">Add ingredients to find recipes.</div>';
}
</script>
</body>
</html>
