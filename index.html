<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SmartBite</title>
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --input: #2c2c2e;
            --text: #ffffff;
            --sec: #8e8e93;
            --accent: #ebd9cc;
            --border: rgba(255, 255, 255, 0.1);
            --glass: rgba(28, 28, 30, 0.85);
        }
        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background: var(--bg); color: var(--text); 
            padding-top: env(safe-area-inset-top);
            padding-bottom: calc(100px + env(safe-area-inset-bottom));
            min-height: 100vh;
        }
        header { 
            position: sticky; top: 0; background: var(--glass); 
            backdrop-filter: blur(25px) saturate(200%); -webkit-backdrop-filter: blur(25px) saturate(200%);
            padding: 12px 20px 16px; display: flex; justify-content: space-between; align-items: center; 
            z-index: 1000; border-bottom: 0.5px solid var(--border);
        }
        h1 { margin: 0; font-size: 32px; font-weight: 700; letter-spacing: -0.8px; }
        .header-btn { background: none; border: none; color: var(--accent); font-size: 17px; font-weight: 600; cursor: pointer; }
        
        .view { display: none; padding: 20px; }
        .view.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card-group { background: var(--card); border-radius: 14px; margin-bottom: 25px; overflow: hidden; border: 0.5px solid var(--border); }
        .card-row { padding: 16px; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .card-row:last-child { border-bottom: none; }
        
        .ios-input { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--input); color: #fff; font-size: 17px; margin-bottom: 15px; outline: none; }
        .search-bar { display: flex; gap: 10px; background: var(--input); padding: 5px 15px; border-radius: 12px; align-items: center; margin-bottom: 20px; border: 0.5px solid var(--border); }
        .search-bar input { flex: 1; border: none; background: transparent; color: #fff; font-size: 17px; padding: 10px 0; outline: none; }
        .btn-add { color: var(--accent); background: none; border: none; font-size: 28px; }
        .btn-primary { width: 100%; padding: 16px; background: var(--accent); color: #000; border: none; border-radius: 14px; font-weight: 700; font-size: 17px; }

        nav { 
            position: fixed !important; bottom: 0 !important; left: 0 !important; right: 0 !important;
            background: var(--glass) !important; backdrop-filter: blur(30px) saturate(200%); -webkit-backdrop-filter: blur(30px) saturate(200%);
            border-top: 0.5px solid var(--border);
            display: flex; justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom);
            padding-top: 15px; z-index: 9999; height: calc(65px + env(safe-area-inset-bottom));
        }
        .nav-item { flex: 1; text-align: center; color: var(--sec); font-size: 10px; font-weight: 600; border: none; background: none; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { width: 24px; height: 24px; display: block; margin: 0 auto 5px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; align-items: flex-end; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--card); width: 100%; max-height: 90vh; border-radius: 25px 25px 0 0; display: flex; flex-direction: column; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { padding: 20px; display: flex; justify-content: space-between; border-bottom: 0.5px solid var(--border); }
        .modal-body { padding: 20px; overflow-y: auto; padding-bottom: 60px; }
        .empty { text-align: center; padding: 60px 20px; color: var(--sec); font-size: 16px; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-database-compat.js"></script>
</head>
<body>

    <header><h1 id="vt">Planner</h1><button class="header-btn" id="ha"></button></header>

    <main id="v-planner" class="view active"><div id="l-planner"></div></main>
    <main id="v-shop" class="view"><div id="l-shop"></div></main>
    <main id="v-pantry" class="view">
        <div class="search-bar"><input type="text" id="pi" placeholder="Add to pantry..."><button class="btn-add" onclick="addP()">+</button></div>
        <div id="l-pantry"></div>
    </main>
    <main id="v-recipes" class="view"><div id="l-recipes"></div></main>
    <main id="v-cook" class="view">
        <div class="search-bar"><input type="text" id="ci" placeholder="What's in the fridge?" oninput="renderC()"></div>
        <div id="l-cook"></div>
    </main>

    <nav>
        <button class="nav-item active" onclick="st('planner','Planner')"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"></rect><path d="M16 2v4M8 2v4M3 10h18"></path></svg>Planner</button>
        <button class="nav-item" onclick="st('shop','Shop')"><svg class="nav-icon" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>Shop</button>
        <button class="nav-item" onclick="st('pantry','Pantry')"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>Pantry</button>
        <button class="nav-item" onclick="st('recipes','Recipes')"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>Recipes</button>
        <button class="nav-item" onclick="st('cook','Cook Now')"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2c0 10 8 10 8 18a8 8 0 0 1-16 0c0-8 8-8 8-18z"></path></svg>Cook</button>
    </nav>

    <div class="modal-overlay" id="mo"><div class="modal"><div class="modal-header"><span id="mt" style="font-weight:800; font-size:20px;"></span><span style="color:var(--accent); font-weight:600;" onclick="cm()">Close</span></div><div class="modal-body" id="mb"></div></div></div>

<script>
const firebaseConfig = { 
    apiKey: "AIzaSyAiaSwfhzy5PpfC_POwlhgBwpYyiyWA2Ow", 
    authDomain: "smartbite-67853.firebaseapp.com", 
    projectId: "smartbite-67853", 
    databaseURL: "https://smartbite-67853-default-rtdb.firebaseio.com" 
};

firebase.initializeApp(firebaseConfig);
const rdb = firebase.database().ref('smartbite_final'); // Nowy, bezpieczny folder
let db = { plan: [], pantry: [], dishes: [], checked: [] };

rdb.on('value', (s) => {
    const data = s.val();
    if (data) {
        db = data;
    } else {
        db.plan = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"].map(d=>({day:d,dish:null}));
        db.pantry = []; db.dishes = []; db.checked = [];
    }
    renderAll();
});

function save() { rdb.set(db); }

function st(id, t) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('v-'+id).classList.add('active');
    event.currentTarget.classList.add('active');
    document.getElementById('vt').innerText = t;
    const b = document.getElementById('ha');
    b.style.display = (id==='shop'||id==='recipes')?'block':'none';
    if(id==='shop'){ b.innerText='Clear'; b.onclick=()=>{db.checked=[];save();}; }
    if(id==='recipes'){ b.innerText='+ Add'; b.onclick=()=>oe(); }
    renderAll();
}

function om(t, h) { document.getElementById('mt').innerText=t; document.getElementById('mb').innerHTML=h; document.getElementById('mo').classList.add('active'); }
function cm() { document.getElementById('mo').classList.remove('active'); }

function renderAll() {
    // Planner
    let ph = '<div class="card-group">';
    (db.plan || []).forEach((p, i) => ph += `<div class="card-row" onclick="pd(${i})"><b>${p.day}</b><span style="color:var(--accent)">${p.dish||'Plan...'}</span></div>`);
    document.getElementById('l-planner').innerHTML = ph + '</div>';

    // Recipes
    if(!db.dishes || !db.dishes.length) {
        document.getElementById('l-recipes').innerHTML = '<div class="empty">No recipes yet. Click + Add.</div>';
    } else {
        let rh = '<div class="card-group">';
        db.dishes.forEach(d => rh += `<div class="card-row" onclick="oe(${d.id})"><b>${d.name}</b></div>`);
        document.getElementById('l-recipes').innerHTML = rh + '</div>';
    }

    // Shop
    let sl = []; if(db.plan) db.plan.forEach(p => { if(p.dish){ const d=(db.dishes||[]).find(x=>x.name===p.dish); if(d) d.ingredients.forEach(i=>{if(!sl.includes(i))sl.push(i)})}});
    let sh = '<div class="card-group">';
    sl.forEach(i => sh += `<div class="card-row" onclick="tc('${i}')"><span style="${db.checked && db.checked.includes(i)?'text-decoration:line-through;color:var(--sec)':''}">${i}</span><span>${db.checked && db.checked.includes(i)?'✅':'⚪️'}</span></div>`);
    document.getElementById('l-shop').innerHTML = sl.length ? sh+'</div>' : '<div class="empty">Shop list empty.</div>';

    // Pantry
    let pah = '<div class="card-group">';
    (db.pantry || []).forEach((p,i) => pah += `<div class="card-row"><span>${p.name}</span><span style="color:red" onclick="db.pantry.splice(${i},1);save()">Del</span></div>`);
    document.getElementById('l-pantry').innerHTML = pah + '</div>';
}

function pd(i) {
    let h = '<div class="card-group">';
    (db.dishes || []).forEach(d => h += `<div class="card-row" onclick="sd(${i},'${d.name}')">${d.name}</div>`);
    om('Select Meal', h+'<div class="card-row" style="color:red" onclick="sd('+i+',null)">Clear</div></div>');
}
function sd(i,n) { db.plan[i].dish=n; save(); cm(); }

let cid=null; let cigs=[];
function oe(id=null) {
    cid=id; const d=(db.dishes || []).find(x => x.id === id); cigs=d?[...d.ingredients]:[];
    let h = `<input type="text" id="en" class="ios-input" value="${d?d.name:''}" placeholder="Recipe Name"><div id="ei" class="card-group"></div>
    <div class="search-bar"><input type="text" id="ein" placeholder="Ingredient..."><button class="btn-add" onclick="ai()">+</button></div>
    <button class="btn-primary" onclick="sr()">Save Recipe</button>
    ${id?`<button style="color:red;width:100%;background:none;border:none;margin-top:20px;" onclick="dr()">Delete</button>`:''}`;
    om(id?'Edit':'New', h); ri();
}
function ri() { document.getElementById('ei').innerHTML = cigs.map((n,i)=>`<div class="card-row"><span>${n}</span><span style="color:red" onclick="cigs.splice(${i},1);ri()">Del</span></div>`).join(''); }
function ai() { const v=document.getElementById('ein').value.trim(); if(v){cigs.push(v); document.getElementById('ein').value=''; ri();}}
function sr() { 
    const n=document.getElementById('en').value.trim(); if(!n) return;
    if(!db.dishes) db.dishes = [];
    if(cid){ const d=db.dishes.find(x=>x.id===cid); d.name=n; d.ingredients=cigs; } 
    else db.dishes.push({id:Date.now(), name:n, ingredients:cigs}); 
    save(); cm(); 
}
function dr() { db.dishes=db.dishes.filter(x=>x.id!==cid); save(); cm(); }
function addP() { const v=document.getElementById('pi').value.trim(); if(v){ if(!db.pantry) db.pantry=[]; db.pantry.push({name:v}); document.getElementById('pi').value=''; save();}}
function renderC() {
    const v=document.getElementById('ci').value.toLowerCase(); if(!v) return;
    const m=(db.dishes || []).filter(d=>d.ingredients.some(i=>i.toLowerCase().includes(v)));
    let h='<div class="card-group">';
    m.forEach(d=>h+=`<div class="card-row"><b>${d.name}</b></div>`);
    document.getElementById('l-cook').innerHTML=h+'</div>';
}
function tc(i) { if(!db.checked) db.checked = []; if(db.checked.includes(i)) db.checked=db.checked.filter(x=>x!==i); else db.checked.push(i); save(); }
</script>
</body>
</html>
