<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SmartBite</title>
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --input: #2c2c2e;
            --text: #ffffff;
            --sec: #8e8e93;
            --accent: #ebd9cc;
            --border: rgba(255, 255, 255, 0.12);
            --glass: rgba(25, 25, 25, 0.85);
        }
        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background: var(--bg); color: var(--text); 
            padding-top: env(safe-area-inset-top);
            padding-bottom: calc(100px + env(safe-area-inset-bottom));
            min-height: 100vh;
        }
        header { 
            position: sticky; top: 0; background: var(--glass); 
            backdrop-filter: blur(25px) saturate(200%); -webkit-backdrop-filter: blur(25px) saturate(200%);
            padding: 12px 20px 16px; display: flex; justify-content: space-between; align-items: center; 
            z-index: 1000; border-bottom: 0.5px solid var(--border);
        }
        h1 { margin: 0; font-size: 32px; font-weight: 700; letter-spacing: -0.8px; }
        .header-btn { background: none; border: none; color: var(--accent); font-size: 17px; font-weight: 600; cursor: pointer; }
        
        .view { display: none; padding: 20px; }
        .view.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card-group { background: var(--card); border-radius: 14px; margin-bottom: 25px; overflow: hidden; border: 0.5px solid var(--border); }
        .card-header { padding: 12px 16px 6px; font-size: 13px; font-weight: 600; color: var(--sec); text-transform: uppercase; letter-spacing: 1px;}
        .card-row { padding: 16px; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .card-row:last-child { border-bottom: none; }
        .card-row:active { background: rgba(255,255,255,0.08); }
        
        .ios-input { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--input); color: #fff; font-size: 17px; margin-bottom: 15px; outline: none; }
        .search-bar { display: flex; gap: 10px; background: var(--input); padding: 5px 15px; border-radius: 14px; align-items: center; margin-bottom: 8px; border: 0.5px solid var(--border); }
        .search-bar input { flex: 1; border: none; background: transparent; color: #fff; font-size: 17px; padding: 10px 0; outline: none; }
        .btn-add { color: var(--accent); background: none; border: none; font-size: 28px; }
        .btn-primary { width: 100%; padding: 16px; background: var(--accent); color: #000; border: none; border-radius: 14px; font-weight: 700; font-size: 17px; margin-top: 15px;}

        .tag-scroll { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 12px; margin-bottom: 10px; scrollbar-width: none; }
        .tag-scroll::-webkit-scrollbar { display: none; }
        .tag { background: var(--card); border: 0.5px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 20px; font-size: 15px; font-weight: 500; white-space: nowrap; cursor: pointer; }
        
        nav { 
            position: fixed !important; bottom: 0 !important; left: 0 !important; right: 0 !important;
            background: var(--glass) !important; backdrop-filter: blur(30px) saturate(200%); -webkit-backdrop-filter: blur(30px) saturate(200%);
            border-top: 0.5px solid var(--border);
            display: flex; justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom);
            padding-top: 12px; z-index: 9999; height: calc(65px + env(safe-area-inset-bottom));
        }
        .nav-item { flex: 1; text-align: center; color: var(--sec); font-size: 10px; font-weight: 600; border: none; background: none; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { width: 24px; height: 24px; display: block; margin: 0 auto 4px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; align-items: flex-end; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--bg); width: 100%; max-height: 90vh; border-radius: 25px 25px 0 0; display: flex; flex-direction: column; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { padding: 20px; display: flex; justify-content: space-between; border-bottom: 0.5px solid var(--border); background: var(--card); border-radius: 25px 25px 0 0;}
        .modal-body { padding: 20px; overflow-y: auto; padding-bottom: 60px; }
        .empty { text-align: center; padding: 60px 20px; color: var(--sec); font-size: 16px; }
        
        .trash-icon { width: 22px; height: 22px; color: #ff453a; display: block; }
        .pantry-badge { font-size: 10px; font-weight: 800; padding: 3px 6px; border-radius: 5px; background: rgba(255,255,255,0.1); color: var(--sec); margin-left: 8px; vertical-align: middle; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-database-compat.js"></script>
</head>
<body>

    <header><h1 id="vt">Planner</h1><button class="header-btn" id="ha"></button></header>

    <main id="v-planner" class="view active"><div id="l-planner"></div></main>
    <main id="v-shop" class="view"><div id="l-shop"></div></main>
    <main id="v-pantry" class="view">
        <form class="search-bar" onsubmit="event.preventDefault(); addP();">
            <input type="text" id="pi" placeholder="Add to pantry...">
            <button type="submit" class="btn-add">+</button>
        </form>
        <div id="l-pantry"></div>
    </main>
    <main id="v-recipes" class="view"><div id="l-recipes"></div></main>
    <main id="v-cook" class="view">
        <div class="search-bar"><input type="text" id="ci" placeholder="What's in the fridge?" oninput="renderC()"></div>
        <div id="l-cook"></div>
    </main>

    <nav>
        <button class="nav-item active" onclick="st('planner','Planner')"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"></rect><path d="M16 2v4M8 2v4M3 10h18"></path></svg>Planner</button>
        <button class="nav-item" onclick="st('shop','Shop')"><svg class="nav-icon" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>Shop</button>
        <button class="nav-item" onclick="st('pantry','Pantry')"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>Pantry</button>
        <button class="nav-item" onclick="st('recipes','Recipes')"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>Recipes</button>
        <button class="nav-item" onclick="st('cook','Cook Now')"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 11-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 2.5z"></path></svg>Cook</button>
    </nav>

    <div class="modal-overlay" id="mo"><div class="modal"><div class="modal-header"><span id="mt" style="font-weight:800; font-size:20px;"></span><span style="color:var(--accent); font-weight:600;" onclick="cm()">Close</span></div><div class="modal-body" id="mb"></div></div></div>

<script>
const firebaseConfig = { 
    apiKey: "AIzaSyAiaSwfhzy5PpfC_POwlhgBwpYyiyWA2Ow", 
    authDomain: "smartbite-67853.firebaseapp.com", 
    projectId: "smartbite-67853", 
    databaseURL: "https://smartbite-67853-default-rtdb.firebaseio.com" 
};

firebase.initializeApp(firebaseConfig);
const rdb = firebase.database().ref('smartbite_app'); 
let db = { plan: [], pantry: [], dishes: [], checked: [] };
let loaded = false;

// Kategoryzacja Składników
const allCategories = ["Bakery", "Dairy", "Drinks", "Household", "Meat & Fish", "Pantry", "Veg & Fruit", "Other"];
const catDict = {
    "milk":"Dairy", "cheese":"Dairy", "butter":"Dairy", "yogurt":"Dairy", "cream":"Dairy", "egg":"Dairy", "eggs":"Dairy", "parmesan":"Dairy",
    "water":"Drinks", "juice":"Drinks", "coffee":"Drinks", "tea":"Drinks",
    "chicken":"Meat & Fish", "beef":"Meat & Fish", "pork":"Meat & Fish", "fish":"Meat & Fish", "salmon":"Meat & Fish", "bacon":"Meat & Fish", "mince":"Meat & Fish",
    "apple":"Veg & Fruit", "banana":"Veg & Fruit", "tomato":"Veg & Fruit", "tomatoes":"Veg & Fruit", "onion":"Veg & Fruit", "garlic":"Veg & Fruit", "potato":"Veg & Fruit", "leek":"Veg & Fruit",
    "bread":"Bakery", "rolls":"Bakery", "tortilla":"Bakery", "pasta":"Pantry", "spaghetti":"Pantry",
    "flour":"Pantry", "sugar":"Pantry", "salt":"Pantry", "oil":"Pantry", "olive oil":"Pantry", "rice":"Pantry", "passata":"Pantry"
};
const dictWords = Object.keys(catDict).map(w => w.charAt(0).toUpperCase() + w.slice(1));

function getCat(name) {
    let lower = name.toLowerCase().trim();
    return catDict[lower] || "Other";
}

rdb.on('value', (s) => {
    const data = s.val();
    if (data) { db = data; } 
    else {
        db.plan = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"].map(d=>({day:d,dish:null}));
        db.pantry = []; db.dishes = []; db.checked = [];
    }
    loaded = true; renderAll();
});

function save() { rdb.set(db); }

function st(id, t) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('v-'+id).classList.add('active');
    event.currentTarget.classList.add('active');
    document.getElementById('vt').innerText = t;
    const b = document.getElementById('ha');
    b.style.display = (id==='shop'||id==='recipes')?'block':'none';
    if(id==='shop'){ b.innerText='Clear'; b.onclick=()=>{db.checked=[];save();}; }
    if(id==='recipes'){ b.innerText='+ Add'; b.onclick=()=>oe(); }
    renderAll();
}

function om(t, h) { document.getElementById('mt').innerText=t; document.getElementById('mb').innerHTML=h; document.getElementById('mo').classList.add('active'); }
function cm() { document.getElementById('mo').classList.remove('active'); }

function renderAll() {
    if(!loaded) return;
    
    // Planner
    let ph = '<div class="card-group">';
    (db.plan || []).forEach((p, i) => ph += `<div class="card-row" onclick="pd(${i})"><b>${p.day}</b><span style="color:var(--accent)">${p.dish||'Plan...'}</span></div>`);
    document.getElementById('l-planner').innerHTML = ph + '</div>';

    // Recipes
    if(!db.dishes || !db.dishes.length) {
        document.getElementById('l-recipes').innerHTML = '<div class="empty">No recipes yet. Click + Add.</div>';
    } else {
        let rh = '<div class="card-group">';
        db.dishes.forEach(d => rh += `<div class="card-row" onclick="oe(${d.id})"><div><b style="font-size:17px;">${d.name}</b><div style="font-size:13px;color:var(--sec);margin-top:2px;">${d.ingredients.join(', ')}</div></div></div>`);
        document.getElementById('l-recipes').innerHTML = rh + '</div>';
    }

    // Shop (z Kategoriami i Agregacją)
    let agg = {};
    (db.plan || []).forEach(p => { 
        if(p.dish) { 
            const d = (db.dishes||[]).find(x=>x.name===p.dish); 
            if(d) d.ingredients.forEach(i => {
                let clean = i.trim();
                let lower = clean.toLowerCase();
                if(agg[lower]) {
                    agg[lower].count++;
                    if(!agg[lower].dishes.includes(p.dish)) agg[lower].dishes.push(p.dish);
                } else {
                    agg[lower] = { name: clean, count: 1, dishes: [p.dish], cat: getCat(clean) };
                }
            });
        }
    });

    let items = Object.values(agg);
    if(items.length === 0) {
        document.getElementById('l-shop').innerHTML = '<div class="empty">Shop list empty. Plan some meals.</div>';
    } else {
        let sh = '';
        allCategories.forEach(c => {
            let catItems = items.filter(i => i.cat === c);
            if(catItems.length > 0) {
                sh += `<div class="card-header">${c}</div><div class="card-group">`;
                catItems.forEach(i => {
                    let inPantry = (db.pantry||[]).some(p => p.name.toLowerCase() === i.name.toLowerCase());
                    let isChecked = (db.checked && db.checked.includes(i.name.toLowerCase())) || inPantry;
                    
                    let checkColor = isChecked ? 'var(--accent)' : 'var(--sec)';
                    let checkFill = isChecked ? 'var(--accent)' : 'none';
                    let style = isChecked ? 'text-decoration:line-through;color:var(--sec)' : '';
                    let countStr = i.count > 1 ? ` <span style="color:var(--accent); font-weight:700">(${i.count}x)</span>` : '';
                    let badge = inPantry ? `<span class="pantry-badge">IN PANTRY</span>` : '';

                    sh += `<div class="card-row" onclick="tc('${i.name.toLowerCase()}')">
                        <div style="display:flex; align-items:center; gap:16px; flex:1;">
                            <svg width="24" height="24" viewBox="0 0 24 24" style="stroke:${checkColor}; fill:${checkFill}; stroke-width:2;"><circle cx="12" cy="12" r="10"></circle>${isChecked?'<path d="M8 12l3 3 5-6" stroke="#000" fill="none"></path>':''}</svg>
                            <div>
                                <div style="font-size:17px; font-weight:500; ${style}">${i.name}${countStr}${badge}</div>
                                <div style="font-size:13px; color:var(--sec); margin-top:2px;">${i.dishes.join(', ')}</div>
                            </div>
                        </div>
                    </div>`;
                });
                sh += `</div>`;
            }
        });
        document.getElementById('l-shop').innerHTML = sh;
    }

    // Pantry (z Kategoriami)
    if(!db.pantry || db.pantry.length === 0) {
        document.getElementById('l-pantry').innerHTML = '<div class="empty">Pantry is empty.</div>';
    } else {
        let pah = '';
        allCategories.forEach(c => {
            let catItems = db.pantry.filter(p => getCat(p.name) === c);
            if(catItems.length > 0) {
                pah += `<div class="card-header">${c}</div><div class="card-group">`;
                catItems.forEach(p => {
                    let idx = db.pantry.indexOf(p);
                    pah += `<div class="card-row">
                        <span style="font-size:17px; font-weight:500;">${p.name}</span>
                        <svg onclick="db.pantry.splice(${idx},1);save()" class="trash-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </div>`;
                });
                pah += `</div>`;
            }
        });
        document.getElementById('l-pantry').innerHTML = pah;
    }
}

function pd(i) {
    let h = '<div class="card-group">';
    (db.dishes || []).forEach(d => h += `<div class="card-row" onclick="sd(${i},'${d.name}')">${d.name}</div>`);
    om('Select Meal', h+'<div class="card-row" style="color:#ff453a" onclick="sd('+i+',null)">Clear Day</div></div>');
}
function sd(i,n) { db.plan[i].dish=n; save(); cm(); }

let cid=null; let cigs=[];
function oe(id=null) {
    cid=id; const d=(db.dishes || []).find(x => x.id === id); cigs=d?[...d.ingredients]:[];
    let h = `
    <input type="text" id="en" class="ios-input" value="${d?d.name:''}" placeholder="Recipe Name">
    <div id="ei" class="card-group" style="margin-bottom: 10px;"></div>
    
    <form class="search-bar" onsubmit="event.preventDefault(); ai();">
        <input type="text" id="ein" placeholder="Add ingredient..." oninput="showSuggs()" autocomplete="off">
        <button type="submit" class="btn-add">+</button>
    </form>
    <div class="tag-scroll" id="rsuggs"></div>
    
    <button class="btn-primary" onclick="sr()">Save Recipe</button>
    ${id?`<button style="color:#ff453a; width:100%; background:none; border:none; margin-top:20px; font-weight:600; font-size:17px;" onclick="dr()">Delete Recipe</button>`:''}`;
    
    om(id?'Edit Recipe':'New Recipe', h); 
    ri();
}

function ri() { 
    const box = document.getElementById('ei');
    if(cigs.length === 0) { box.style.display = 'none'; return; }
    box.style.display = 'block';
    box.innerHTML = cigs.map((n,i)=>`
        <div class="card-row">
            <span style="font-size:17px;">${n}</span>
            <svg onclick="cigs.splice(${i},1);ri()" class="trash-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
        </div>`).join(''); 
}

function showSuggs() {
    const val = document.getElementById('ein').value.toLowerCase().trim();
    if(!val) { document.getElementById('rsuggs').innerHTML = ''; return; }
    
    let all = [...new Set([...dictWords, ...(db.pantry||[]).map(p=>p.name), ...(db.dishes||[]).flatMap(d=>d.ingredients)])];
    let matches = all.filter(i => i.toLowerCase().includes(val) && !cigs.some(c=>c.toLowerCase()===i.toLowerCase())).slice(0, 6);
    
    document.getElementById('rsuggs').innerHTML = matches.map(i => `<span class="tag" onclick="addSugg('${i}')">${i}</span>`).join('');
}

function addSugg(val) {
    cigs.push(val.charAt(0).toUpperCase() + val.slice(1));
    document.getElementById('ein').value = '';
    showSuggs(); ri();
    document.getElementById('ein').focus(); 
}

function ai() { 
    const v=document.getElementById('ein').value.trim(); 
    if(v) {
        cigs.push(v.charAt(0).toUpperCase() + v.slice(1)); 
        document.getElementById('ein').value=''; 
        showSuggs(); ri();
    }
    document.getElementById('ein').focus(); 
}

function sr() { 
    const n=document.getElementById('en').value.trim(); if(!n) return;
    if(!db.dishes) db.dishes = [];
    if(cid){ const d=db.dishes.find(x=>x.id===cid); d.name=n; d.ingredients=cigs; } 
    else db.dishes.push({id:Date.now(), name:n, ingredients:cigs}); 
    save(); cm(); 
}

function dr() { db.dishes=db.dishes.filter(x=>x.id!==cid); save(); cm(); }

function addP() { 
    const inp = document.getElementById('pi');
    const v = inp.value.trim(); 
    if(v){ 
        if(!db.pantry) db.pantry=[]; 
        db.pantry.push({name: v.charAt(0).toUpperCase() + v.slice(1)}); 
        inp.value=''; 
        save();
    }
    inp.focus(); 
}

function renderC() {
    const v=document.getElementById('ci').value.toLowerCase(); if(!v) { document.getElementById('l-cook').innerHTML=''; return; }
    const m=(db.dishes || []).filter(d=>d.ingredients.some(i=>i.toLowerCase().includes(v)));
    let h='<div class="card-group">';
    m.forEach(d=>h+=`<div class="card-row"><b>${d.name}</b></div>`);
    document.getElementById('l-cook').innerHTML=h+'</div>';
}

function tc(i) { 
    if(!db.checked) db.checked = []; 
    if(db.checked.includes(i)) db.checked=db.checked.filter(x=>x!==i); 
    else db.checked.push(i); 
    save(); 
}
</script>
</body>
</html>
