<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SmartBite</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --input: #2c2c2e;
            --text: #ffffff;
            --sec: #8e8e93;
            --accent: #ebd9cc;
            --border: rgba(255, 255, 255, 0.1);
            --glass: rgba(28, 28, 30, 0.7);
        }
        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background: var(--bg); color: var(--text); 
            padding-top: env(safe-area-inset-top);
            padding-bottom: calc(100px + env(safe-area-inset-bottom));
            min-height: 100vh;
        }
        header { 
            position: sticky; top: 0; background: var(--glass); 
            backdrop-filter: blur(25px) saturate(200%); -webkit-backdrop-filter: blur(25px) saturate(200%);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            z-index: 100; border-bottom: 0.5px solid var(--border);
        }
        h1 { margin: 0; font-size: 32px; font-weight: 700; }
        .header-btn { background: none; border: none; color: var(--accent); font-size: 17px; font-weight: 600; }
        .view { display: none; padding: 20px; }
        .view.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card-group { background: var(--card); border-radius: 14px; margin-bottom: 25px; overflow: hidden; border: 0.5px solid var(--border); }
        .card-row { padding: 16px; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .card-row:last-child { border-bottom: none; }
        .ios-input { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--input); color: #fff; font-size: 17px; margin-bottom: 15px; outline: none; }
        .search-bar { display: flex; gap: 10px; background: var(--input); padding: 5px 15px; border-radius: 12px; align-items: center; margin-bottom: 20px; border: 0.5px solid var(--border); }
        .search-bar input { flex: 1; border: none; background: transparent; color: #fff; font-size: 17px; padding: 10px 0; outline: none; }
        .btn-add { color: var(--accent); background: none; border: none; font-size: 28px; }
        .btn-primary { width: 100%; padding: 16px; background: var(--accent); color: #000; border: none; border-radius: 14px; font-weight: 700; font-size: 17px; }
        
        nav { 
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--glass); backdrop-filter: blur(30px) saturate(200%); -webkit-backdrop-filter: blur(30px) saturate(200%);
            border-top: 0.5px solid var(--border);
            display: flex; justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom);
            padding-top: 15px; z-index: 1000;
        }
        .nav-item { flex: 1; text-align: center; color: var(--sec); font-size: 10px; font-weight: 600; border: none; background: none; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { width: 24px; height: 24px; display: block; margin: 0 auto 5px; fill: none; stroke: currentColor; stroke-width: 2.2; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; align-items: flex-end; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--card); width: 100%; max-height: 90vh; border-radius: 25px 25px 0 0; display: flex; flex-direction: column; animation: slideUp 0.3s cubic-bezier(0, 0.5, 0.5, 1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { padding: 20px; display: flex; justify-content: space-between; border-bottom: 0.5px solid var(--border); background: var(--card); border-radius: 25px 25px 0 0;}
        .modal-body { padding: 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 40px; }
        .empty { text-align: center; padding: 60px 20px; color: var(--sec); font-size: 16px; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-database-compat.js"></script>
</head>
<body>

    <header><h1 id="view-title">Planner</h1><button class="header-btn" id="header-action"></button></header>

    <main id="v-planner" class="view active"><div id="list-planner"></div></main>
    <main id="v-shop" class="view"><div id="list-shop"></div></main>
    <main id="v-pantry" class="view">
        <div class="search-bar"><input type="text" id="pantry-in" placeholder="Add to pantry..."><button class="btn-add" onclick="addP()">+</button></div>
        <div id="list-pantry"></div>
    </main>
    <main id="v-recipes" class="view"><div id="list-recipes"></div></main>
    <main id="v-cook" class="view">
        <div class="search-bar"><input type="text" id="cook-in" placeholder="What ingredients do you have?" oninput="renderCook()"></div>
        <div id="list-cook"></div>
    </main>

    <nav>
        <button class="nav-item active" onclick="switchTab('planner', 'Planner')">
            <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"></rect><path d="M16 2v4M8 2v4M3 10h18"></path></svg>Planner
        </button>
        <button class="nav-item" onclick="switchTab('shop', 'Shop')">
            <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>Shop
        </button>
        <button class="nav-item" onclick="switchTab('pantry', 'Pantry')">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>Pantry
        </button>
        <button class="nav-item" onclick="switchTab('recipes', 'Recipes')">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>Recipes
        </button>
        <button class="nav-item" onclick="switchTab('cook', 'Cook Now')">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2c0 10 8 10 8 18a8 8 0 0 1-16 0c0-8 8-8 8-18z"></path></svg>Cook
        </button>
    </nav>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-header"><span id="modal-title" style="font-weight:800; font-size:20px;"></span><span style="color:var(--accent); font-weight:600;" onclick="closeM()">Close</span></div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAiaSwfhzy5PpfC_POwlhgBwpYyiyWA2Ow",
    authDomain: "smartbite-67853.firebaseapp.com",
    projectId: "smartbite-67853",
    databaseURL: "https://smartbite-67853-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();
let db = { plan: [], pantry: [], dishes: [], checked: [] };

// --- MAGIC RECOVERY LOGIC ---
// Sprawdzamy oba foldery, w których mogły zapisać się przepisy
database.ref('/').on('value', (snap) => {
    const allData = snap.val() || {};
    // Łączymy dane z "smartbite" i "smartbite_shared_data"
    const d1 = allData.smartbite || {};
    const d2 = allData.smartbite_shared_data || {};
    
    db.dishes = [...(d1.dishes || []), ...(d2.dishes || [])];
    // Usuwamy duplikaty przepisów po nazwie
    db.dishes = db.dishes.filter((v,i,a)=>a.findIndex(t=>(t.name === v.name))===i);
    
    db.pantry = d1.pantry || d2.pantry || [];
    db.plan = d1.plan || d2.plan || ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"].map(d=>({day:d,dish:null}));
    db.checked = d1.checked || d2.checked || [];
    
    renderAll();
});

function save() { database.ref('smartbite').set(db); database.ref('smartbite_shared_data').set(db); }

function switchTab(id, t) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('v-'+id).classList.add('active');
    event.currentTarget.classList.add('active');
    document.getElementById('view-title').innerText = t;
    const btn = document.getElementById('header-action');
    btn.style.display = (id === 'shop' || id === 'recipes') ? 'block' : 'none';
    if(id === 'shop') { btn.innerText = 'Clear'; btn.onclick = () => { db.checked = []; save(); }; }
    if(id === 'recipes') { btn.innerText = '+ Add'; btn.onclick = () => openEdit(); }
    renderAll();
}

function openM(t, h) { document.getElementById('modal-title').innerText = t; document.getElementById('modal-body').innerHTML = h; document.getElementById('modal-overlay').classList.add('active'); }
function closeM() { document.getElementById('modal-overlay').classList.remove('active'); }

function renderAll() { renderPlan(); renderShop(); renderPan(); renderRec(); renderCook(); }

function renderPlan() {
    let h = '<div class="card-group">';
    db.plan.forEach((p, i) => h += `<div class="card-row" onclick="pickD(${i})"><b>${p.day}</b><span style="color:var(--accent)">${p.dish || 'Plan...'}</span></div>`);
    document.getElementById('list-planner').innerHTML = h + '</div>';
}
function pickD(i) {
    let h = '<div class="card-group"><div class="card-row" style="color:red" onclick="setD('+i+', null)">Clear Day</div>';
    db.dishes.forEach(d => h += `<div class="card-row" onclick="setD(${i},'${d.name}')">${d.name}</div>`);
    openM('Meal for ' + db.plan[i].day, h + '</div>');
}
function setD(i, n) { db.plan[i].dish = n; save(); closeM(); }

function renderRec() {
    if (!db.dishes.length) { document.getElementById('list-recipes').innerHTML = '<div class="empty">No recipes found.</div>'; return; }
    let h = '<div class="card-group">';
    db.dishes.forEach(d => h += `<div class="card-row" onclick="openEdit(${d.id})"><div><b>${d.name}</b><div style="font-size:12px;color:var(--sec)">${d.ingredients.join(', ')}</div></div></div>`);
    document.getElementById('list-recipes').innerHTML = h + '</div>';
}

let curId = null; let curIngs = [];
function openEdit(id = null) {
    curId = id; const d = db.dishes.find(x => x.id === id); curIngs = d ? [...d.ingredients] : [];
    let h = `<input type="text" id="en" class="ios-input" value="${d?d.name:''}" placeholder="Recipe Name"><div id="ei" class="card-group"></div>
    <div class="search-bar"><input type="text" id="ein" placeholder="Ingredient..."><button class="btn-add" onclick="addI()">+</button></div>
    <button class="btn-primary" onclick="saveR()">Save Recipe</button>
    ${id ? `<button style="color:red;width:100%;background:none;border:none;margin-top:20px;" onclick="delR()">Delete Recipe</button>` : ''}`;
    openM(id?'Edit':'New', h); renderI();
}
function renderI() { document.getElementById('ei').innerHTML = curIngs.map((n, i) => `<div class="card-row"><span>${n}</span><span style="color:red" onclick="curIngs.splice(${i},1);renderI()">Del</span></div>`).join(''); }
function addI() { const v = document.getElementById('ein').value.trim(); if(v){curIngs.push(v); document.getElementById('ein').value=''; renderI();}}
function saveR() {
    const n = document.getElementById('en').value.trim(); if(!n) return;
    if(curId){ const d=db.dishes.find(x=>x.id===curId); d.name=n; d.ingredients=curIngs; }
    else db.dishes.push({id:Date.now(), name:n, ingredients:curIngs});
    save(); closeM();
}
function delR() { db.dishes=db.dishes.filter(x=>x.id!==curId); save(); closeM(); }

function renderPan() {
    let h = '<div class="card-group">';
    db.pantry.forEach((item, i) => h += `<div class="card-row"><span>${item.name}</span><span style="color:red" onclick="db.pantry.splice(${i},1);save()">Del</span></div>`);
    document.getElementById('list-pantry').innerHTML = h + '</div>';
}
function addP() { const v = document.getElementById('pantry-in').value.trim(); if(v){db.pantry.push({name:v}); document.getElementById('pantry-in').value=''; save();}}

function renderShop() {
    let l = []; db.plan.forEach(p => { if(p.dish){ const d=db.dishes.find(x=>x.name===p.dish); if(d) d.ingredients.forEach(i=>{if(!l.includes(i))l.push(i);}); }});
    if(!l.length){ document.getElementById('list-shop').innerHTML='<div class="empty">Shop list is empty.</div>'; return; }
    let h = '<div class="card-group">';
    l.forEach(i => h += `<div class="card-row" onclick="tC('${i}')"><span style="${db.checked.includes(i)?'text-decoration:line-through;color:var(--sec)':''}">${i}</span><span>${db.checked.includes(i)?'✅':'⚪️'}</span></div>`);
    document.getElementById('list-shop').innerHTML = h + '</div>';
}
function tC(i) { if(db.checked.includes(i)) db.checked=db.checked.filter(x=>x!==i); else db.checked.push(i); save(); }

function renderCook() {
    const v = document.getElementById('cook-in').value.toLowerCase();
    if(!v){ document.getElementById('list-cook').innerHTML='<div class="empty">Enter ingredient to find recipes.</div>'; return; }
    const m = db.dishes.filter(d => d.ingredients.some(i => i.toLowerCase().includes(v)));
    let h = '<div class="card-group">';
    m.forEach(d => h += `<div class="card-row"><b>${d.name}</b><span style="font-size:12px">${d.ingredients.length} items</span></div>`);
    document.getElementById('list-cook').innerHTML = h + '</div>';
}
</script>
</body>
</html>
